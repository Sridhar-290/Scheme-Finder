kind = "web"
previewPath = "/"
title = "AI Public Benefits Navigator"
version = "1.0.0"
id = "artifacts/navigator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22968

[services.development]
run = "pnpm --filter @workspace/navigator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/navigator", "run", "build" ]
publicDir = "artifacts/navigator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22968"
BASE_PATH = "/"
